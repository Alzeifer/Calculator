<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Document</title>
</head>
<body>
    


    <div class="container">

    <h1 class="title">Calculator</h1>
    
    <input type="text" class="userInput" id="display" placeholder="0" autofocus="" readonly>

    <div class="buttons">

    <div class="lines">

    <button class="num">1</button>
    <button class="num">2</button>
    <button class="num">3</button>
    <button class="operator num">+</button>
    </div>

    <div class="lines">    
    <button class="num" >4</button>
    <button class="num" >5</button>
    <button class="num" >6</button>
    <button class="operator num">-</button>
    </div>

    <div class="lines">
    <button class="num">7</button>
    <button class="num">8</button>
    <button class="num">9</button>
    <button class="operator num">*</button>
    </div>

    <div class="lines">
    <button class="num">+/-</button>
    <button class="num">0</button>
    <button class="num">.</button>
    <button class="operator num" >/</button>
    </div>

    <div class="lines">
    <button class="specials" id="backspace" >⌫</button>
    <button class="specials num" id="clear" >C</button>
    <button class="specials num" id="equal" >=</button>
    </div>
    </div>
   </div>
    
   <script src="main.js"></script>
   
</body>
</html>
