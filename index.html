<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Document</title>
</head>
<body>
    


    <div class="container">

    <h1 class="title">Calculator</h1>
    
    <input type="text" class="userInput" id="display" placeholder="0" autofocus="" readonly>

    <div class="buttons">

    <div class="lines">

    <button class="num" value="1">1</button>
    <button class="num" value="2">2</button>
    <button class="num" value="3">3</button>
    <button class="operator">+</button>
    </div>

    <div class="lines">    
    <button class="num" value="4">4</button>
    <button class="num" value="5">5</button>
    <button class="num" value="6">6</button>
    <button class="operator">-</button>
    </div>

    <div class="lines">
    <button class="num" value="7">7</button>
    <button class="num" value="8">8</button>
    <button class="num" value="9">9</button>
    <button class="operator">*</button>
    </div>

    <div class="lines">
    <button>+/-</button>
    <button class="num" value="0">0</button>
    <button>.</button>
    <button class="operator">/</button>
    </div>

    <div class="lines">
    <button class="specials" id="backspace" value="backspace">⌫</button>
    <button class="specials" id="clear" value="c">C</button>
    <button class="specials">=</button>
    </div>
    </div>
   </div>
    
   <script src="main.js"></script>
   
</body>
</html>
