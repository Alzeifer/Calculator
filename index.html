<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Document</title>
</head>
<body>
    
    <script src="main.js"></script>


    <div class="container">

    <h1 class="title">Calculator</h1>
    
    <input type="text" class="userInput" id="display" placeholder="0" inputmode="decimal" autofocus="">

    <div class="buttons">

    <div class="lines">
    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button class="operator">+</button>
    </div>

    <div class="lines">    
    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button class="operator">-</button>
    </div>

    <div class="lines">
    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button class="operator">*</button>
    </div>

    <div class="lines">
    <button>+/-</button>
    <button>0</button>
    <button>.</button>
    <button class="operator">/</button>
    </div>

    <div class="lines">
    <button class="specials">⌫</button>
    <button class="specials">C</button>
    <button class="specials">=</button>
    </div>
    </div>
   </div>
    
</body>
</html>
